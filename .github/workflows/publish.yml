name: Publish to Hex

on:
  push:
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ELIXIR_VERSION: "1.19"
  OTP_VERSION: "28.0"

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libopenblas-dev

      - name: Restore FAISS build cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/faiss_ex
          key: publish-faiss-${{ hashFiles('Makefile') }}
          restore-keys: |
            Linux-faiss-

      - name: Set version from tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          sed -i "s/@version \".*\"/@version \"${TAG_VERSION}\"/" mix.exs
          grep '@version' mix.exs

      - run: mix deps.get
        env:
          MIX_ENV: dev

      # hex.publish builds docs, which compiles the project (and FAISS from
      # source on a cold cache — ~10 min)
      - run: mix compile
        env:
          MIX_ENV: dev

      - name: Publish to Hex
        run: mix hex.publish --yes
        env:
          MIX_ENV: dev
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
