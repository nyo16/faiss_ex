name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MIX_ENV: test
  ELIXIR_VERSION: "1.18"
  OTP_VERSION: "27.0"

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-22.04
    outputs:
      cache-key: ${{ steps.key.outputs.value }}
      faiss-key: ${{ steps.key.outputs.faiss }}
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libopenblas-dev

      - name: Compute cache keys
        id: key
        env:
          SRC_HASH: ${{ hashFiles('mix.lock', 'c_src/**', 'Makefile') }}
          RUNNER_OS: ${{ runner.os }}
        run: |
          FAISS_REV=$(sed -n 's/^FAISS_GIT_REV *?= *//p' Makefile | tr -d ' ')
          echo "value=${RUNNER_OS}-mix-${ELIXIR_VERSION}-${OTP_VERSION}-test-${SRC_HASH}-${FAISS_REV}" >> "$GITHUB_OUTPUT"
          echo "faiss=${RUNNER_OS}-faiss-${FAISS_REV}" >> "$GITHUB_OUTPUT"

      # FAISS source build (~10 min) is cached independently of the NIF/deps
      # so c_src/lib changes don't rebuild FAISS
      - name: Cache FAISS build
        uses: actions/cache@v5
        with:
          path: ~/.cache/faiss_ex
          key: ${{ steps.key.outputs.faiss }}

      - name: Cache deps & build
        id: cache
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build/test
          key: ${{ steps.key.outputs.value }}

      - run: mix deps.get
        if: steps.cache.outputs.cache-hit != 'true'

      - run: mix compile --warnings-as-errors
        if: steps.cache.outputs.cache-hit != 'true'

  format:
    name: Formatting
    runs-on: ubuntu-22.04
    needs: [setup]
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - run: mix format --check-formatted

  test:
    name: Tests
    runs-on: ubuntu-22.04
    needs: [setup]
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install runtime dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libopenblas-dev

      - uses: actions/cache/restore@v5
        with:
          path: ~/.cache/faiss_ex
          key: ${{ needs.setup.outputs.faiss-key }}
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        with:
          path: |
            deps
            _build/test
          key: ${{ needs.setup.outputs.cache-key }}
          fail-on-cache-miss: true

      - run: mix test --include slow
